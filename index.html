<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidekick - Streamer Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .logo-text {
            background: linear-gradient(90deg, #1e40af, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white/5 backdrop-blur-md border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <!-- Your Original Logo + Lettering -->
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-600 via-violet-600 to-cyan-400 rounded-2xl flex items-center justify-center overflow-hidden">
                    <img src="logo.png" alt="Sidekick Logo" class="w-9 h-9 object-contain">
                </div>
                <div>
                    <span class="text-2xl font-bold logo-text">SIDEKICK</span>
                    <p class="text-[10px] text-cyan-400 -mt-1 tracking-widest">STREAMER CLIPS</p>
                </div>
            </div>
            
            <!-- Navigation -->
            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="#" class="hover:text-cyan-400 transition-colors">Home</a>
                <a href="#" class="hover:text-cyan-400 transition-colors">Clips</a>
                <a href="#" class="hover:text-cyan-400 transition-colors">Pricing</a>
                <a href="#" class="hover:text-cyan-400 transition-colors">About</a>
                <a href="#" class="hover:text-cyan-400 transition-colors">Contact</a>
            </div>
            
            <button onclick="alert('Coming soon!')" 
                    class="bg-white text-black px-6 py-2.5 rounded-full font-semibold text-sm hover:bg-cyan-400 transition-colors">
                Browse Clips
            </button>
